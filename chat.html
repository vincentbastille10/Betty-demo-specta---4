<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Betty Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f1e;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 16px;
    }
    .chat {
      width: 100%;
      max-width: 500px;
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .messages {
      height: 360px;
      overflow-y: auto;
      padding: 8px;
      background: #0f172a;
      border-radius: 8px;
    }
    .msg { margin: 8px 0; white-space: pre-wrap; }
    .user { text-align: right; color: #fff; }
    .bot { text-align: left; color: #a78bfa; }
    .footer { display: flex; gap: 8px; }
    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }
    button {
      border: none;
      border-radius: 6px;
      background: #7b61ff;
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 16px;
    }
    .status { min-height: 16px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="chat">
    <div id="messages" class="messages">
      <div class="msg bot">Bonjour 🙂 Envoyez votre message.</div>
    </div>
    <div class="footer">
      <input id="input" placeholder="Écrivez votre message…" />
      <button id="send" type="button">Envoyer</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const status = document.getElementById("status");

      const message = input.value.trim();
      if (!message) return;

      messages.innerHTML += `<div class="msg user">${message}</div>`;
      input.value = "";
      status.textContent = "Betty réfléchit…";
      messages.scrollTop = messages.scrollHeight;

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Erreur serveur");
        }

        messages.innerHTML += `<div class="msg bot">${data.response}</div>`;
        status.textContent = "";
      } catch (error) {
        messages.innerHTML += `<div class="msg bot">Erreur: ${String(error.message || error)}</div>`;
        status.textContent = "";
      }

      messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById("send").addEventListener("click", send);
    document.getElementById("input").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
